{% extends "base.html" %}

{% block content %}
<div class="card">
<h2>Edit Booking</h2>

<form action="/update/{{ booking[0] }}" method="POST">

    <input type="text" name="guest_name" value="{{ booking[1] }}" required>
    <input type="email" name="email" value="{{ booking[2] }}" required>

    <select name="room_type">
        <option {% if booking[3]=="Single" %}selected{% endif %}>Single</option>
        <option {% if booking[3]=="Double" %}selected{% endif %}>Double</option>
        <option {% if booking[3]=="Suite" %}selected{% endif %}>Suite</option>
    </select>

    <button class="btn-update">Update Booking</button>
</form>
</div>
{% endblock %}
